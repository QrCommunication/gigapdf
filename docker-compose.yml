# GigaPDF - Docker Compose Configuration
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: gigapdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gigapdf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigapdf_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gigapdf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigapdf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gigapdf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend Services
  # ============================================

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: production
    container_name: gigapdf-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigapdf}:${POSTGRES_PASSWORD:-gigapdf_secret}@postgres:5432/${POSTGRES_DB:-gigapdf}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AUTH_JWT_PUBLIC_KEY=${AUTH_JWT_PUBLIC_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: celery-worker
    container_name: gigapdf-celery-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigapdf}:${POSTGRES_PASSWORD:-gigapdf_secret}@postgres:5432/${POSTGRES_DB:-gigapdf}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: celery-beat
    container_name: gigapdf-celery-beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigapdf}:${POSTGRES_PASSWORD:-gigapdf_secret}@postgres:5432/${POSTGRES_DB:-gigapdf}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Frontend Services
  # ============================================

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: production
    container_name: gigapdf-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigapdf}:${POSTGRES_PASSWORD:-gigapdf_secret}@postgres:5432/${POSTGRES_DB:-gigapdf}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
      - postgres

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      target: production
    container_name: gigapdf-admin
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigapdf}:${POSTGRES_PASSWORD:-gigapdf_secret}@postgres:5432/${POSTGRES_DB:-gigapdf}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    depends_on:
      - api
      - postgres

# ============================================
# Volumes
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================

networks:
  default:
    name: gigapdf-network
    driver: bridge
