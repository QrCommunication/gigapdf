# =============================================================================
# GigaPDF Nginx Configuration
# =============================================================================

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream nextjs_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream nextjs_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Maintenance page: served from /var/www/gigapdf-maintenance/
# Deploy script copies deploy/nginx/maintenance.html there during setup.
# Nginx falls back to this page on 502/503/504 (backend unreachable).

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name giga-pdf.com www.giga-pdf.com api.giga-pdf.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# API Subdomain - api.giga-pdf.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.giga-pdf.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/giga-pdf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giga-pdf.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration — TLSv1.3 only (drop TLSv1.2 to prevent downgrade attacks)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — 1 year + includeSubDomains + preload (aligned with Next.js headers)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    # X-XSS-Protection removed: deprecated, CSP is the modern replacement
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # CORS headers for API subdomain
    add_header Access-Control-Allow-Origin "https://giga-pdf.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, Content-Disposition" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Client body size for file uploads
    client_max_body_size 100M;  # Unified at 100 MB — SESSION_20260423_023327
    client_body_timeout 300s;

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # API Documentation (Swagger/ReDoc)
    location /api/docs {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://fastapi_backend/api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/redoc {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://fastapi_backend/api/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/openapi.json {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://fastapi_backend/api/v1/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint
    location /socket.io/ {
        proxy_pass http://fastapi_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # File upload with extended timeout
    location /api/v1/documents/upload {
        limit_req zone=upload_limit burst=10 nodelay;
        proxy_pass http://fastapi_backend/api/v1/documents/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Webhooks
    location /webhooks/ {
        proxy_pass http://fastapi_backend/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All API routes
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Maintenance fallback when backend is temporarily down (deploy/restart)
        error_page 502 503 504 @api_maintenance;
    }

    location @api_maintenance {
        add_header Content-Type application/json always;
        add_header Retry-After 30 always;
        return 503 '{"detail":"Service temporarily unavailable. Deployment in progress. Please retry in 30 seconds."}';
    }

    # Health check
    location /health {
        access_log off;
        proxy_pass http://fastapi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name giga-pdf.com www.giga-pdf.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/giga-pdf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giga-pdf.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration — TLSv1.3 only (drop TLSv1.2 to prevent downgrade attacks)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — 1 year + includeSubDomains + preload (aligned with Next.js headers)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    # X-XSS-Protection removed: deprecated, CSP is the modern replacement
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Client body size for file uploads
    client_max_body_size 100M;  # Unified at 100 MB — SESSION_20260423_023327
    client_body_timeout 300s;

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ==========================================================================
    # Next.js Auth Routes (Better Auth) - Must be before /api/
    # ==========================================================================
    location /api/auth/ {
        proxy_pass http://nextjs_web/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ==========================================================================
    # Next.js PDF Engine Routes (TypeScript) - Must be before /api/
    # Routes /api/pdf/* sont servies par Next.js (pdf-engine TS), pas Python
    # ==========================================================================
    location /api/pdf/ {
        client_max_body_size 100M;
        proxy_pass http://nextjs_web/api/pdf/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ==========================================================================
    # API Routes - FastAPI Backend
    # ==========================================================================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS headers (if not handled by FastAPI)
        # add_header Access-Control-Allow-Origin "*" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # WebSocket endpoint for real-time updates
    location /api/ws {
        proxy_pass http://fastapi_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Socket.IO endpoint
    location /socket.io/ {
        proxy_pass http://fastapi_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # File upload endpoint with specific limits
    location /api/upload {
        limit_req zone=upload_limit burst=10 nodelay;

        proxy_pass http://fastapi_backend/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeout for large uploads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Stripe webhooks
    location /webhooks/stripe {
        proxy_pass http://fastapi_backend/webhooks/stripe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Admin Panel - Next.js Admin
    # ==========================================================================
    location /admin {
        proxy_pass http://nextjs_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/webpack-hmr {
        proxy_pass http://nextjs_web/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==========================================================================
    # Main Application - Next.js Web
    # ==========================================================================
    location / {
        proxy_pass http://nextjs_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Maintenance fallback when Next.js is restarting (deploy window ~5s)
        error_page 502 503 504 /maintenance.html;
    }

    # Maintenance page (served locally — no upstream dependency)
    location = /maintenance.html {
        root /var/www/gigapdf-maintenance;
        internal;
        add_header Cache-Control "no-store" always;
    }

    # Admin static files caching (must be before generic static rule)
    location ~* ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files caching (web app)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
