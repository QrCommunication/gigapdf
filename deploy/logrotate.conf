# GigaPDF logrotate configuration
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/gigapdf
# Verify:  sudo logrotate --debug /etc/logrotate.d/gigapdf

/var/log/gigapdf/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0640 gigapdf gigapdf
    sharedscripts
}
