<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigaPDF — Maintenance en cours</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: #6366f1;
      letter-spacing: -0.05em;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      color: #64748b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">GigaPDF</div>
    <h1>Mise a jour en cours</h1>
    <p>
      Nous deployons une nouvelle version de GigaPDF.<br>
      Le service sera de nouveau disponible dans quelques instants.
    </p>
    <div class="badge">
      <span class="dot"></span>
      Deploiement en cours&hellip;
    </div>
  </div>
</body>
</html>
