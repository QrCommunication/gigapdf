name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────────────────────────────
  # JS/TS — Lint (Turbo)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (JS/TS)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Runner system Node bumped to 22 (2026-06-13, image qrcom/github-runner:noble-node22)
        # → v6's @pnpm/exe bootstrap works. No version input: pnpm reads
        # packageManager (pnpm@10.28.0) from package.json (single source of truth).

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        # turbo --concurrency=1: lint's `^build` rebuilds every package (tsup
        # DTS). Serial keeps peak RSS below the shared runner's RAM (OOM/137 fix).
        # Call turbo directly: `pnpm lint -- <flag>` forwards to the task, not turbo.
        run: pnpm exec turbo run lint --concurrency=1

  # ─────────────────────────────────────────────
  # JS/TS — Type-check (Turbo)
  # ─────────────────────────────────────────────
  type-check:
    name: Type Check (JS/TS)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Runner system Node bumped to 22 (2026-06-13, image qrcom/github-runner:noble-node22)
        # → v6's @pnpm/exe bootstrap works. No version input: pnpm reads
        # packageManager (pnpm@10.28.0) from package.json (single source of truth).

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type-check
        # turbo --concurrency=1: type-check's `^build` rebuilds every package
        # (tsup DTS). Serial keeps peak RSS below the runner's RAM (OOM/137 fix —
        # pdf-engine#build was SIGKILLed building DTS concurrently with editor).
        # Call turbo directly: `pnpm type-check -- <flag>` forwards to tsc, not turbo.
        run: pnpm exec turbo run type-check --concurrency=1

  # ─────────────────────────────────────────────
  # JS/TS — Tests packages (pdf-engine + editor)
  # ─────────────────────────────────────────────
  test-packages:
    name: Test (packages)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Runner system Node bumped to 22 (2026-06-13, image qrcom/github-runner:noble-node22)
        # → v6's @pnpm/exe bootstrap works. No version input: pnpm reads
        # packageManager (pnpm@10.28.0) from package.json (single source of truth).

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required by Turbo dependency graph)
        # turbo --concurrency=1: serial package builds keep peak RSS below the
        # runner's RAM (tsup DTS is memory-heavy; concurrent builds → OOM/137).
        run: pnpm exec turbo run build --filter='./packages/*' --concurrency=1

      - name: Run package tests
        run: pnpm test --filter=@giga-pdf/pdf-engine --filter=@giga-pdf/editor

  # ─────────────────────────────────────────────
  # JS/TS — Tests web app
  # ─────────────────────────────────────────────
  test-web:
    name: Test (web)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Runner system Node bumped to 22 (2026-06-13, image qrcom/github-runner:noble-node22)
        # → v6's @pnpm/exe bootstrap works. No version input: pnpm reads
        # packageManager (pnpm@10.28.0) from package.json (single source of truth).

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required by Turbo dependency graph)
        # turbo --concurrency=1: serial package builds keep peak RSS below the
        # runner's RAM (tsup DTS is memory-heavy; concurrent builds → OOM/137).
        run: pnpm exec turbo run build --filter='./packages/*' --concurrency=1

      - name: Run web tests
        run: pnpm test --filter=web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ─────────────────────────────────────────────
  # Python — Lint (ruff) + Type-check (mypy)
  # ─────────────────────────────────────────────
  lint-python:
    name: Lint + Type Check (Python)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (lint)
        run: ruff check app/

      - name: Run mypy (type-check)
        run: mypy app/ --ignore-missing-imports

  # ─────────────────────────────────────────────
  # Python — Tests unitaires
  # ─────────────────────────────────────────────
  test-backend:
    name: Test (Python backend)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379

  # ─────────────────────────────────────────────
  # Build final (gate de merge)
  # ─────────────────────────────────────────────
  build:
    name: Build (JS/TS)
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 10
    needs: [lint, type-check, test-packages, test-web, lint-python, test-backend]
    env:
      NEXT_PUBLIC_API_URL: https://api.giga-pdf.com
      NEXT_PUBLIC_WS_URL: wss://api.giga-pdf.com
      NEXT_PUBLIC_APP_URL: https://app.giga-pdf.com
      # Legal env vars required by apps/web/src/lib/env.ts in production builds.
      NEXT_PUBLIC_LEGAL_COMPANY_NAME: "QR Communication"
      NEXT_PUBLIC_LEGAL_COMPANY_FORM: "SAS"
      NEXT_PUBLIC_LEGAL_SIREN: "940 163 496"
      NEXT_PUBLIC_LEGAL_APE: "73.12Z"
      NEXT_PUBLIC_LEGAL_ADDRESS: "23 rue de Richelieu, 75001 Paris, France"
      NEXT_PUBLIC_LEGAL_PHONE: "+33 1 88 83 34 51"
      NEXT_PUBLIC_LEGAL_CONTACT_EMAIL: "contact@qrcommunication.com"
      NEXT_PUBLIC_LEGAL_PUBLICATION_DIRECTOR: "Le Président de QR Communication SAS"
      NEXT_PUBLIC_LEGAL_HOST_NAME: "Scaleway SAS"
      NEXT_PUBLIC_LEGAL_HOST_ADDRESS: "8 rue de la Ville l'Évêque, 75008 Paris, France"
      NEXT_PUBLIC_LEGAL_HOST_PHONE: "+33 1 84 13 00 00"
      # Build-time placeholders (better-auth + Prisma need a connection string
      # at build for schema parsing; the build never connects to the DB).
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      BETTER_AUTH_SECRET: "ci-build-placeholder-secret-do-not-use-in-prod"
      BETTER_AUTH_URL: "https://app.giga-pdf.com"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Runner system Node bumped to 22 (2026-06-13, image qrcom/github-runner:noble-node22)
        # → v6's @pnpm/exe bootstrap works. No version input: pnpm reads
        # packageManager (pnpm@10.28.0) from package.json (single source of truth).

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        # turbo --concurrency=1: serial build keeps peak RSS below the runner's
        # RAM. Mirrors deploy.sh's documented `turbo build --concurrency=1`.
        run: pnpm exec turbo run build --concurrency=1

  # ─────────────────────────────────────────────
  # Auto-deploy en production (push main, après CI vert, hors changements mobile-only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: [self-hosted, linux, x64, hetzner, qrcom]
    timeout-minutes: 15
    # Uniquement push direct sur main + APRÈS que tout le CI soit vert (needs: build).
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # historique requis pour diff la portée du push (gate mobile)

      - name: Gate — ne pas déployer si le push ne touche QUE apps/mobile/
        id: gate
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Pas de base SHA (nouvelle branche) → deploy"
            echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo __DIFF_FAILED__)"
          if [ "$changed" = "__DIFF_FAILED__" ] || [ -z "$changed" ]; then
            echo "Diff indisponible → deploy (défaut sûr)"
            echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Fichiers modifiés :"; printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -qvE '^apps/mobile/'; then
            echo "→ changements hors mobile : DEPLOY"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ changements mobile-only : SKIP deploy"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Déploiement SSH (clé à commande forcée → /usr/local/bin/gigapdf-ci-deploy.sh)
        if: steps.gate.outputs.deploy == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          PROD_HOST: "51.159.105.179"
        run: |
          set -euo pipefail
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$DEPLOY_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -H "$PROD_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          # Clé restreinte côté serveur (command="..." dans authorized_keys) : l'argument
          # ci-dessous est ignoré, la clé ne peut QUE lancer git reset origin/main + deploy.sh.
          ssh -T -i "$KEY_FILE" -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            -o BatchMode=yes ubuntu@"$PROD_HOST" deploy
