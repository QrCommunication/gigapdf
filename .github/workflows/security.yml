name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    # Block PRs introducing high+ CVEs before they reach main.
    branches: [main]
  schedule:
    # Chaque lundi à 06:00 UTC
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────────────────────────────
  # Audit JS/TS — pnpm audit
  # ─────────────────────────────────────────────
  audit-js:
    name: Audit JS/TS dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (high+ severity)
        run: pnpm audit --audit-level=high

      - name: Snapshot full audit report (artifact)
        if: always()
        run: pnpm audit --json > audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-${{ github.run_id }}
          path: audit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Audit Python — pip-audit
  # ─────────────────────────────────────────────
  audit-python:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc

  # ─────────────────────────────────────────────
  # Lockfile integrity
  # ─────────────────────────────────────────────
  lockfile-integrity:
    name: Lockfile integrity check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Verify lockfile is up-to-date
        run: pnpm install --frozen-lockfile
