name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Check DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          missing=0
          mapfile -t commits < <(git rev-list "${BASE_SHA}".."${HEAD_SHA}")
          if [ "${#commits[@]}" -eq 0 ]; then
            echo "No commits to verify."
            exit 0
          fi
          echo "Checking ${#commits[@]} commit(s) for DCO sign-off…"
          for sha in "${commits[@]}"; do
            short="${sha:0:8}"
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            sob_lines=$(git log -1 --format='%B' "$sha" | grep -E '^Signed-off-by: ' || true)
            if [ -z "$sob_lines" ]; then
              echo "::error::Commit ${short} (${author_name} <${author_email}>) is missing 'Signed-off-by:' trailer."
              missing=$((missing + 1))
              continue
            fi
            expected="Signed-off-by: ${author_name} <${author_email}>"
            if echo "$sob_lines" | grep -Fxq "$expected"; then
              echo "✓ ${short} signed off by ${author_name} <${author_email}>"
            else
              echo "::warning::Commit ${short} has 'Signed-off-by:' but does not match author."
              echo "  expected: ${expected}"
              echo "  found:    $(echo "$sob_lines" | head -1)"
              echo "✓ ${short} (sign-off present, accepting)"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "::error::${missing} commit(s) missing DCO sign-off."
            echo "Fix locally with:  git rebase --signoff main && git push --force-with-lease"
            exit 1
          fi
          echo ""
          echo "All ${#commits[@]} commit(s) DCO-signed."
