# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate revision id in filenames
truncate_slug_length = 40

# Set to 'true' to run migrations in an offline mode
prepend_sys_path = .

# Timezone for filename generation
timezone = UTC

# Max length of revision ids
revision_environment = false

# Include object name in migration file names
sourceless = false

# Version location specification
version_locations = %(here)s/migrations/versions

# Output encoding
output_encoding = utf-8

# Database URL - override with environment variable
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Format using black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
